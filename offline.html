<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#00C2A0"/>
  <title>Sem conexão - Iforms ICF</title>
  <link rel="manifest" href="./manifest.json"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; background: #020817; min-height: 100dvh; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 0.4; }
      100% { transform: scale(0.8); opacity: 0.8; }
    }
    .pulse-icon { animation: pulse-ring 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-[#020817] text-white flex flex-col items-center justify-center min-h-screen px-6 text-center">

  <div class="max-w-sm w-full space-y-8">

    <!-- Icon -->
    <div class="flex justify-center">
      <div class="relative">
        <div class="w-24 h-24 rounded-full bg-[#0f172a] border-2 border-[#1e293b] flex items-center justify-center pulse-icon">
          <span class="material-symbols-outlined text-[#94a3b8] text-5xl">wifi_off</span>
        </div>
      </div>
    </div>

    <!-- Text -->
    <div class="space-y-3">
      <h1 class="text-2xl font-bold text-white">Sem conexão</h1>
      <p class="text-[#94a3b8] text-base leading-relaxed">
        Você está offline. Verifique sua conexão com a internet e tente novamente.
      </p>
    </div>

    <!-- Cached pages -->
    <div class="bg-[#0f172a] border border-[#1e293b] rounded-xl p-4 text-left space-y-3">
      <p class="text-xs text-[#00C2A0] font-bold uppercase tracking-wider">Páginas disponíveis offline</p>
      <div class="space-y-2">
        <a href="./dashboard.html" class="flex items-center gap-3 p-2 rounded-lg hover:bg-[#1e293b] transition-colors">
          <span class="material-symbols-outlined text-[#00C2A0] text-sm">home</span>
          <span class="text-sm text-[#f1f5f9]">Dashboard</span>
        </a>
        <a href="./aula.html" class="flex items-center gap-3 p-2 rounded-lg hover:bg-[#1e293b] transition-colors">
          <span class="material-symbols-outlined text-[#00C2A0] text-sm">school</span>
          <span class="text-sm text-[#f1f5f9]">Aula 1: Rompendo a Âncora</span>
        </a>
        <a href="./calculadora.html" class="flex items-center gap-3 p-2 rounded-lg hover:bg-[#1e293b] transition-colors">
          <span class="material-symbols-outlined text-[#00C2A0] text-sm">calculate</span>
          <span class="text-sm text-[#f1f5f9]">Calculadora de Materiais</span>
        </a>
        <a href="./comunidade.html" class="flex items-center gap-3 p-2 rounded-lg hover:bg-[#1e293b] transition-colors">
          <span class="material-symbols-outlined text-[#00C2A0] text-sm">group</span>
          <span class="text-sm text-[#f1f5f9]">Comunidade</span>
        </a>
      </div>
    </div>

    <!-- Retry -->
    <button
      onclick="window.location.reload()"
      class="w-full bg-[#00C2A0] text-[#031632] font-bold py-4 rounded-xl text-base hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
    >
      <span class="material-symbols-outlined text-sm">refresh</span>
      Tentar novamente
    </button>

    <p class="text-xs text-[#475569]">Iforms Grupo ICF · Plataforma de Treinamento ICF</p>
  </div>

  <script>
    // Auto-retry quando voltar online
    window.addEventListener('online', () => {
      window.location.href = './dashboard.html';
    });
  </script>
</body>
</html>
