<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecossistema Grupo ICF</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#001529">
    <link rel="manifest" href="./manifest.json">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        :root {
            --primary: #00C2A0;
            --background: #001529;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .hero-bg {
            position: fixed;
            inset: 0;
            background-image: url('login-hero.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .overlay-v2 {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, 
                rgba(0,21,41,0.1) 0%, 
                rgba(0,21,41,0.6) 50%, 
                rgba(0,21,41,1) 100%);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
            margin-top: auto;
            padding: 2.5rem 1.5rem;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .catchphrase {
            font-family: 'Caveat', cursive;
            color: var(--primary);
            transform: rotate(-3deg);
            display: inline-block;
        }

        .btn-start {
            background: linear-gradient(135deg, #00C2A0 0%, #008f75 100%);
            box-shadow: 0 8px 25px rgba(0, 194, 160, 0.4);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>
    <div class="overlay-v2"></div>

    <main class="content">
        <div class="mb-10">
            <span class="catchphrase text-5xl md:text-6xl mb-4">Eeeita glória!</span>
            <h1 class="text-3xl md:text-4xl font-black leading-tight tracking-tight">
                Bem-vindo ao <br>
                <span class="text-primary">Ecossistema ICF</span>
            </h1>
            <p class="text-white/50 text-xs mt-3 font-medium uppercase tracking-widest">
                A Elite da Construção Inteligente
            </p>
        </div>

        <a href="dashboard.html" class="btn-start w-full py-5 rounded-2xl flex items-center justify-center gap-3 text-white font-black uppercase tracking-widest text-sm transition-transform active:scale-95">
            <span>Iniciar Jornada</span>
            <span class="material-symbols-outlined">bolt</span>
        </a>

        <p class="text-[9px] text-center text-white/30 mt-6 uppercase tracking-widest font-bold">
            Ambiente Seguro & Homologado
        </p>
    </main>

</body>
</html>
