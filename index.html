<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#00C2A0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Iforms"/>
  <meta name="description" content="Iforms Grupo ICF - Plataforma de treinamento técnico em construção ICF"/>
  <title>Iforms Grupo ICF</title>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.svg"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #020817;
      color: #f8fafc;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap { margin-bottom: 24px; }
    .logo-wrap img { height: 40px; width: auto; }
    p { color: #94a3b8; font-size: 14px; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #1e293b;
      border-top-color: #00C2A0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="./assets/icons/logo.svg" alt="Iforms Grupo ICF" />
  </div>
  <p>Carregando...</p>
  <div class="spinner"></div>

  <script>
    // Redirect imediato para o dashboard
    window.location.replace('./dashboard.html');
  </script>
</body>
</html>
